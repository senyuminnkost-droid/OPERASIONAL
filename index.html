
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senyum INN - Exclusive kost Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#FE7D21",
                        "brand-gray": "#757575",
                        "brand-black": "#1E1919",
                        "background-light": "#F8F9FA",
                        "background-dark": "#121212",
                    }
                },
            },
        }
    </script>
    <style>
        /* Menggunakan font-stack standar yang paling nyaman dibaca di semua sistem */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            line-height: 1.5;
        }
        
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'liga' on;
            width: 1em;
            height: 1em;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FE7D21; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
        
        .no-print { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-brand-black dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
